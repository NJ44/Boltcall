    <!-- Critical inline styles: ensures blank page has correct background/font before
         the async CSS bundle loads. Prevents flash of unstyled content on first paint. -->

    <!-- GTM noscript: only rendered if JS is disabled — no consent possible without JS, so we omit analytics here -->
    <!-- (GTM noscript removed — consent-gated analytics require JavaScript) -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Canonical URL updater — runs after body so it never blocks HTML parsing.
         Prerender (Puppeteer) executes this before capturing, so static HTML is correct. -->
    <script>var p=window.location.pathname||'/';var u='https://boltcall.org'+(p==='/'?'/':p.replace(/\/?$/,'/'));document.querySelector('link[rel="canonical"]').href=u;document.querySelector('meta[property="og:url"]').content=u;</script>

    <!-- OpenAI ChatKit — deferred until user interacts or after 5s idle.
         Moved out of <head> so the event-listener setup never parser-blocks. -->
    <script>
      var _ckLoaded=false;
      function _loadChatKit(){if(_ckLoaded)return;_ckLoaded=true;var s=document.createElement('script');s.src='https://cdn.platform.openai.com/deployments/chatkit/chatkit.js';s.async=true;document.head.appendChild(s);}
      ['scroll','click','touchstart','mousemove'].forEach(function(e){document.addEventListener(e,_loadChatKit,{once:true,passive:true});});
      setTimeout(_loadChatKit,5000);
    </script>

    <!-- Analytics: consent-gated. CookieBanner component handles loading after user accepts.
         On returning visits where consent was previously accepted, React's CookieBanner
         calls loadAnalytics() on mount. No analytics fire without explicit consent. -->
  </body>
