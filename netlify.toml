[build]
  publish = "dist"
  command = "npm run build:prerender"

# Service worker must not be cached by browser/CDN
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[redirects]]
  from = "http://boltcall.org/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.boltcall.org/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.boltcall.org/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://boltcall.netlify.app/*"
  to = "https://boltcall.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "VITE_RETELL_PUBLIC_KEY"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."agent-test"]
  timeout = 300

[functions."agent-self-heal"]
  timeout = 300

# Run message dispatcher every 5 minutes to process due scheduled_messages
[functions."message-dispatcher"]
  schedule = "*/5 * * * *"

# Run sequence processor every 5 minutes to advance follow-up enrollments
[functions."sequence-processor"]
  schedule = "*/5 * * * *"

# Run email inbox poller every 3 minutes to fetch new lead emails
[functions."email-inbox-poller"]
  schedule = "*/3 * * * *"

# Send daily lead summary email to all active users at 07:00 UTC (10 AM Israel / 3 AM EST)
[functions."daily-lead-summary"]
  schedule = "0 7 * * *"

# Netlify handles /.netlify/functions/* routing automatically — no redirect needed

# Long cache for hashed static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
